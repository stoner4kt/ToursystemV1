<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2744">
  <title>INYATHI — Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">IN<span>YATHI</span></div>
        <div class="login-tagline">Fleet Management System</div>
        <span class="login-role-badge" id="role-badge">Reset Password</span>
      </div>

      <form id="reset-form" novalidate>
        <div class="login-field">
          <label for="password">New Password</label>
          <input type="password" id="password" class="login-input" minlength="8" placeholder="Min 8 characters" required>
          <div id="strength" style="font-size:.8rem;color:var(--text-muted);margin-top:5px">Strength: —</div>
        </div>
        <div class="login-field">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="login-input" minlength="8" required>
        </div>
        <div class="login-actions">
          <button type="submit" id="btn-save" class="btn btn-amber btn-full">Update Password</button>
        </div>
      </form>

      <div id="msg" class="login-msg" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    const role        = new URLSearchParams(location.search).get('role') || 'driver';
    const redirectUrl = role === 'admin' ? 'admin-login.html' : 'driver-login.html';
    const badge       = document.getElementById('role-badge');
    badge.textContent = role === 'admin' ? 'Admin · New Password' : 'Driver · New Password';
    if (role === 'driver') badge.classList.add('driver');

    const pass        = document.getElementById('password');
    const confirmPass = document.getElementById('confirm-password');
    const strength    = document.getElementById('strength');
    const msg         = document.getElementById('msg');

    pass.addEventListener('input', () => {
      const v = pass.value;
      let label = 'Weak', color = 'var(--red)';
      if (v.length >= 12 && /\d/.test(v) && /[A-Z]/.test(v) && /[^\w]/.test(v)) { label = 'Strong'; color = 'var(--green)'; }
      else if (v.length >= 8) { label = 'Medium'; color = 'var(--amber)'; }
      strength.textContent = `Strength: ${label}`;
      strength.style.color = color;
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p = pass.value, c = confirmPass.value;
      if (p.length < 8) return show('Password must be at least 8 characters.', 'error');
      if (p !== c)      return show('Passwords do not match.', 'error');
      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.textContent = 'Updating…';
      const { error } = await sb.auth.updateUser({ password: p });
      btn.disabled = false; btn.textContent = 'Update Password';
      if (error) return show(error.message, 'error');
      show('Password updated! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = redirectUrl; }, 1500);
    });

    function show(text, type) { msg.textContent = text; msg.className = `login-msg ${type}`; }
  </script>
</body>
</html>
