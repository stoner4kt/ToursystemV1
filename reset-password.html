<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2744">
  <title>TransRoute — Reset Password</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main" style="max-width:460px;margin:40px auto">
    <div class="card">
      <div class="card-title">Reset Password</div>
      <div class="card-subtitle">Enter and confirm your new password.</div>
      <form id="reset-form" style="margin-top:12px">
        <div class="form-group"><label>New Password</label><input id="password" type="password" class="form-control" minlength="8" required></div>
        <div class="form-group"><label>Confirm Password</label><input id="confirm-password" type="password" class="form-control" minlength="8" required></div>
        <div id="strength" style="font-size:.85rem;color:var(--text-muted);margin-bottom:10px">Strength: —</div>
        <button id="btn-save" type="submit" class="btn btn-amber btn-full">Update Password</button>
      </form>
      <p id="msg" aria-live="polite" style="margin-top:10px"></p>
      <a href="driver-login.html" class="btn btn-sm btn-outline">Back to Driver Login</a>
    </div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const pass = document.getElementById('password');
const confirmPass = document.getElementById('confirm-password');
const strength = document.getElementById('strength');
const msg = document.getElementById('msg');

pass.addEventListener('input', () => {
  const v = pass.value;
  let label = 'Weak';
  if (v.length >= 12 && /\d/.test(v) && /[A-Z]/.test(v) && /[^\w]/.test(v)) label = 'Strong';
  else if (v.length >= 8) label = 'Medium';
  strength.textContent = `Strength: ${label}`;
});

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const p = pass.value;
  const c = confirmPass.value;
  if (p.length < 8) return show('Password must be at least 8 characters.', 'error');
  if (p !== c) return show('Passwords do not match.', 'error');
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Updating…';
  const { error } = await sb.auth.updateUser({ password: p });
  btn.disabled = false; btn.textContent = 'Update Password';
  if (error) return show(error.message, 'error');
  show('Password updated. Redirecting to driver login…', 'success');
  setTimeout(() => window.location.href = '/driver-login.html', 1500);
});

function show(text, type){ msg.textContent = text; msg.className = `toast toast-${type}`; }
</script>
</body>
</html>
