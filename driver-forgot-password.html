<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2744">
  <title>CCSHUTTLES — Driver Password Reset</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">CC<span>SHUTTLES</span></div>
        <div class="login-tagline">Fleet Management System</div>
        <span class="login-role-badge driver">Driver · Reset Password</span>
      </div>

      <form id="form" novalidate>
        <div class="login-field">
          <label for="email">Driver Email Address</label>
          <input type="email" id="email" class="login-input" placeholder="driver@ccshuttles.co.za" required autocomplete="email">
        </div>
        <div class="login-actions">
          <button type="submit" id="btn" class="btn btn-amber btn-full">Send Reset Link</button>
          <a href="driver-login.html" class="btn btn-outline btn-full">Back to Driver Login</a>
        </div>
      </form>

      <div id="msg" class="login-msg" role="alert" aria-live="polite"></div>
      <div class="login-footer">A password reset link will be sent to your email.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const sb  = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const msg = document.getElementById('msg');

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('btn');
      const email = document.getElementById('email').value.trim();
      if (!email) return show('Please enter your email address.', 'error');
      btn.disabled = true; btn.textContent = 'Sending…';
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: `${location.origin}/reset-password.html?role=driver`,
      });
      btn.disabled = false; btn.textContent = 'Send Reset Link';
      if (error) show(error.message, 'error');
      else show('Reset link sent! Check your email inbox.', 'success');
    });

    function show(text, type) { msg.textContent = text; msg.className = `login-msg ${type}`; }
  </script>
</body>
</html>
