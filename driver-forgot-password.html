<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Driver Forgot Password</title><link rel="stylesheet" href="style.css"></head>
<body><main class="main" style="max-width:460px;margin:40px auto"><div class="card"><div class="card-title">Driver Password Reset</div><form id="form"><div class="form-group"><label>Driver Email</label><input id="email" type="email" class="form-control" required></div><button class="btn btn-amber btn-full" id="btn" type="submit">Send Reset Link</button></form><p id="msg" style="margin-top:10px"></p><a href="driver-login.html">Back to Driver Login</a></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="config.js"></script><script>
const sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);form.addEventListener('submit',async(e)=>{e.preventDefault();btn.disabled=true;const {error}=await sb.auth.resetPasswordForEmail(email.value.trim(),{redirectTo:`${location.origin}/reset-password.html?role=driver`});btn.disabled=false;msg.textContent=error?error.message:'Reset email sent.';});
</script></body></html>
