<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2744">
  <title>CCSHUTTLES — Admin Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">CC<span>SHUTTLES</span></div>
        <div class="login-tagline">Fleet Management System</div>
        <span class="login-role-badge">Admin Portal</span>
      </div>

      <form id="admin-login-form" novalidate>
        <div class="login-field">
          <label for="email">Admin Email</label>
          <input type="email" id="email" class="login-input" placeholder="admin@ccshuttles.co.za" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" class="login-input" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <div class="login-actions">
          <button type="submit" class="btn btn-amber btn-full" id="btn-login">Sign In</button>
          <a href="admin-forgot-password.html" class="btn btn-outline btn-full">Forgot Password</a>
        </div>
      </form>

      <div id="msg" class="login-msg" role="alert" aria-live="polite"></div>

      <div class="login-links">
        <a href="driver-login.html" class="login-link">Driver Login →</a>
      </div>

      <div class="login-footer">CCSHUTTLES (Pty) Ltd · Fleet Management</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="admin-login.js"></script>
</body>
</html>
